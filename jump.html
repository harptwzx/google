<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>跳转中...</title>
    <meta http-equiv="refresh" content="0; url=" id="meta-refresh">
    <script>
        // 从 URL 参数获取目标网址
        var params = new URLSearchParams(window.location.search);
        var url = params.get('url');
        
        if (url) {
            // 方式1：用 meta 标签跳转（最可靠）
            document.getElementById('meta-refresh').setAttribute('content', '0; url=' + url);
            // 方式2：用 JavaScript 跳转（双保险）
            window.location.href = url;
        } else {
            document.body.innerHTML = '<h2>请使用 ?url=目标网址 参数访问</h2>';
        }
    </script>
</head>
<body>
    <p>正在跳转，请稍候...</p>
</body>
</html>
