<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>网址跳转</title>
</head>
<body>
    <p>正在通过手机网络跳转...</p>
    <script>
        // 1. 从参数获取目标网址
        var params = new URLSearchParams(window.location.search);
        var targetUrl = params.get('url');

        if (targetUrl) {
            // 2. ⚠️ 关键修改：把跳转目标改成你的手机代理地址 ⚠️
            // 把下面这行换成你真实的隧道地址
            var proxyHost = "https://tile-matrix-friendly-elizabeth.trycloudflare.com";
            
            // 3. 拼接出最终的代理链接
            var finalUrl = proxyHost + "/proxy?url=" + encodeURIComponent(targetUrl);
            
            // 4. 跳转
            window.location.href = finalUrl;
        } else {
            document.body.innerHTML = '<h2>请使用 ?url=目标网址 参数访问</h2>';
        }
    </script>
</body>
</html>
