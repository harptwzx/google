<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Google 搜索镜像</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        input { padding: 10px; width: 400px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Google 搜索（镜像）</h2>
    <p>输入关键词，直接跳转到 Google 搜索结果</p>
    <input type="text" id="q" placeholder="输入搜索关键词">
    <button onclick="go()">搜索</button>
    <script>
        function go() {
            var keyword = document.getElementById('q').value.trim();
            if (keyword) {
                window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(keyword) + "&lite=1";
            }
        }
    </script>
</body>
</html>
